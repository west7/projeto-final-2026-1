services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      RAW_DATA_DIR: /app/dataset
      PREPARED_FEATURES_PATH: /app/backend/data/prepared_orders.jsonl
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

  # Optional experiment tracking. Enabled only with `--profile mlflow`, so a plain
  # `docker compose up` never starts it and the API/frontend serve without it.
  # Point eval at it via MLFLOW_TRACKING_URI=http://localhost:5000.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    profiles: [mlflow]
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  mlflow-data:
